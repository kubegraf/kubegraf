# NOTE: This workflow is disabled (trigger changed to workflow_dispatch).
# KubeGraf is a Go CLI tool — use release.yml (GoReleaser) for releases.
# This workflow adds the Windows installer on top of GoReleaser binaries.
name: Build and Release All Platforms

# This workflow should be in the MAIN kubegraf repository (not kubegraf.io)
# It builds binaries for all platforms and creates installers

on:
  workflow_dispatch:  # Manual trigger only — disabled from auto-run
    inputs:
      version:
        description: 'Version to build (e.g., 1.7.60). Must match an existing GitHub release tag.'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # Build binaries for all platforms
  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64

          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64

          # macOS builds
          - os: darwin
            arch: amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64

          - os: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64

          # Windows builds
          - os: windows
            arch: amd64
            runner: ubuntu-latest  # Cross-compile Windows from Linux
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/solid/package-lock.json

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"   # strip leading v if present
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build Web UI
        run: |
          cd ui/solid
          npm ci
          npm run build
          # Vite outDir is ../../web/dist — output lands at web/dist directly

      - name: Verify web/dist
        run: |
          echo "Contents of web/dist:"
          ls -la web/dist/ | head -20

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_NAME="kubegraf"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="kubegraf.exe"
          fi

          echo "Building ${OUTPUT_NAME} for ${{ matrix.os }}-${{ matrix.arch }}"
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X github.com/kubegraf/kubegraf/cli/cmd.cliVersion=${VERSION}" \
            -o ${OUTPUT_NAME} \
            .
          ls -lh ${OUTPUT_NAME}

      - name: Create archive
        id: archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="kubegraf-${{ matrix.os }}-${{ matrix.arch }}.zip"
            zip ${ARCHIVE} kubegraf.exe
          else
            ARCHIVE="kubegraf-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
            tar czf ${ARCHIVE} kubegraf
          fi

          echo "Created: ${ARCHIVE}"
          ls -lh ${ARCHIVE}

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            shasum -a 256 ${ARCHIVE} > ${ARCHIVE}.sha256
          else
            sha256sum ${ARCHIVE} > ${ARCHIVE}.sha256
          fi

          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubegraf-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            kubegraf-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 7

  # Build Windows installer
  build-windows-installer:
    name: Build Windows Installer
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: kubegraf-windows-amd64
          path: ./

      - name: Extract binary and place for Inno Setup
        run: |
          Expand-Archive kubegraf-windows-amd64.zip -DestinationPath .
          Move-Item kubegraf.exe installer\windows\kubegraf.exe -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Get version
        id: version
        run: |
          $version = "${{ github.event.inputs.version }}".TrimStart("v")
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Update version in installer script
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $content = Get-Content installer\windows\kubegraf-setup.iss -Raw
          $content = $content -replace '#define AppVersion "[^"]*"', "#define AppVersion `"$version`""
          Set-Content installer\windows\kubegraf-setup.iss -Value $content
          echo "Updated AppVersion to: $version"

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\kubegraf-setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubegraf-windows-installer
          path: dist/windows/kubegraf-*-setup.exe
          retention-days: 7

  # Upload all artifacts to the existing GitHub release
  upload-to-release:
    name: Upload to GitHub Release
    needs: [build-binaries, build-windows-installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display artifacts
        run: find artifacts/ -type f | sort

      - name: Get version/tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload artifacts to existing release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Uploading assets to release $TAG"
          # Upload all .tar.gz, .zip, .exe, .sha256 files — --clobber overwrites if already exists
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.sha256" \) \
            -exec gh release upload "$TAG" {} --clobber \;
          echo "✅ All artifacts uploaded to $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update Homebrew formula (only if token is configured)
  update-homebrew:
    name: Update Homebrew Formula
    needs: upload-to-release
    runs-on: ubuntu-latest
    continue-on-error: true  # Skip gracefully if HOMEBREW_TAP_TOKEN not set
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: kubegraf/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          curl -fL https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-darwin-amd64.tar.gz.sha256 -o darwin-amd64.sha256 || true
          curl -fL https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-darwin-arm64.tar.gz.sha256 -o darwin-arm64.sha256 || true

          AMD64_SHA=$(cut -d ' ' -f1 darwin-amd64.sha256 2>/dev/null || echo "")
          ARM64_SHA=$(cut -d ' ' -f1 darwin-arm64.sha256 2>/dev/null || echo "")

          cat > Formula/kubegraf.rb <<EOF
          class Kubegraf < Formula
            desc "Intelligent Kubernetes Control Center"
            homepage "https://kubegraf.io"
            version "${VERSION}"

            if Hardware::CPU.intel?
              url "https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-darwin-amd64.tar.gz"
              sha256 "${AMD64_SHA}"
            else
              url "https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-darwin-arm64.tar.gz"
              sha256 "${ARM64_SHA}"
            end

            def install
              bin.install "kubegraf"
            end

            test do
              system "#{bin}/kubegraf", "--version"
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kubegraf.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update kubegraf to ${VERSION}"
            git push
          fi

  # Update Scoop manifest (only if token is configured)
  update-scoop:
    name: Update Scoop Manifest
    needs: upload-to-release
    runs-on: ubuntu-latest
    continue-on-error: true  # Skip gracefully if SCOOP_BUCKET_TOKEN not set
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: kubegraf/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          curl -fL https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-windows-amd64.zip -o kubegraf.zip
          HASH=$(sha256sum kubegraf.zip | cut -d ' ' -f1)

          mkdir -p bucket
          cat > bucket/kubegraf.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Intelligent Kubernetes Control Center",
            "homepage": "https://kubegraf.io",
            "license": "Apache-2.0",
            "url": "https://github.com/kubegraf/kubegraf/releases/download/v${VERSION}/kubegraf-windows-amd64.zip",
            "hash": "${HASH}",
            "bin": "kubegraf.exe",
            "checkver": {
              "github": "https://github.com/kubegraf/kubegraf"
            },
            "autoupdate": {
              "url": "https://github.com/kubegraf/kubegraf/releases/download/v\$version/kubegraf-windows-amd64.zip"
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/kubegraf.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update kubegraf to ${VERSION}"
            git push
          fi
