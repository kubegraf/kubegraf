name: Hotfix Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Hotfix version (e.g., v1.7.28)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format vX.Y.Z (e.g., v1.7.28)"
            exit 1
          fi
          echo "Version format is valid: $VERSION"

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/solid/package-lock.json

      - name: Build SolidJS UI
        run: |
          cd ui/solid
          npm ci
          npm run build

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p web
          rm -rf web/dist
          cp -r ui/solid/dist web/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        run: go build -v

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/solid/package-lock.json

      - name: Build SolidJS UI
        run: |
          cd ui/solid
          npm ci
          npm run build

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p web
          rm -rf web/dist
          cp -r ui/solid/dist web/dist

      - name: Clean Go toolchain cache
        run: |
          rm -rf ~/go/pkg/mod/golang.org/toolchain@v0.0.1-go1.24.0.linux-amd64 2>/dev/null || true
          rm -rf ${{ env.GOMODCACHE }}/golang.org/toolchain@v0.0.1-go1.24.0.linux-amd64 2>/dev/null || true
          find ~/go/pkg/mod/golang.org/toolchain* -type d -name "*go1.24.0*" -exec rm -rf {} + 2>/dev/null || true
        continue-on-error: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Bump version files
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v'
          VER="${VERSION#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # version.go
          perl -pi -e "s/var version = \"[^\"]+\"/var version = \"${VER}\"/" version.go
          perl -pi -e "s/const Version = \"[^\"]+\"/const Version = \"${VER}\"/" version.go

          # cli/cmd/version.go
          perl -pi -e "s/var cliVersion = \"[^\"]+\"/var cliVersion = \"${VER}\"/" cli/cmd/version.go

          # ui/solid/package.json
          perl -pi -e "s/\"version\": \"[^\"]+\"/\"version\": \"${VER}\"/" ui/solid/package.json

          git add version.go cli/cmd/version.go ui/solid/package.json
          git diff --cached --stat
          git commit -m "chore: bump version to ${VER}" || echo "No version changes to commit"
          git push origin HEAD:main

      - name: Create Git Tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Hotfix release $VERSION"
          git push origin "$VERSION"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Verify Release Published
        run: |
          echo "Waiting for release to be available..."
          sleep 5

          # Check if release exists
          if gh release view "${{ inputs.version }}" > /dev/null 2>&1; then
            echo "✅ Release published successfully!"
            gh release view "${{ inputs.version }}" --json tagName,name,url,createdAt,assets
          else
            echo "⚠️ Release not found, may still be processing"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Summary
        run: |
          echo "## 🚀 Hotfix Release ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Successfully released and deployed version ${{ inputs.version }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release: Published" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Binaries: Built for all platforms (Linux, macOS, Windows)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Checksums: Generated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Homebrew: Formula updated (if token configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- Linux: amd64, arm64" >> $GITHUB_STEP_SUMMARY
          echo "- macOS: amd64 (Intel), arm64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: amd64, arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Release Contents" >> $GITHUB_STEP_SUMMARY
          echo "This hotfix release includes:" >> $GITHUB_STEP_SUMMARY
          echo "- Test resources for custom apps" >> $GITHUB_STEP_SUMMARY
          echo "- Sample Helm charts for testing" >> $GITHUB_STEP_SUMMARY
          echo "- Test manifests for various failure scenarios" >> $GITHUB_STEP_SUMMARY
          echo "- Bug fixes and improvements" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- 📥 [Download Release](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 [View Changelog](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "- 🍺 Homebrew: \`brew install kubegraf/tap/kubegraf\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Release created by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
