name: Bug Report
description: Report a bug or unexpected behaviour in KubeGraf.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check [existing issues](https://github.com/kubegraf/kubegraf/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: KubeGraf version
      description: Run `kubegraf --version` to get this.
      placeholder: "e.g. v1.0.1"
    validations:
      required: true

  - type: input
    id: kubernetes_version
    attributes:
      label: Kubernetes version
      description: Run `kubectl version --short` to get this.
      placeholder: "e.g. v1.30.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `kubegraf web`
        2. Navigate to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant output. This will be formatted as code automatically.
      render: shell
